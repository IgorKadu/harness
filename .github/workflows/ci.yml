name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - name: Syntax check
        run: |
          for f in src/engine.mjs src/core/*.mjs src/modules/*.mjs src/llm/*.mjs \
                   server/*.mjs bin/os.mjs bin/scaffold.mjs bin/installer.mjs bin/commands/*.mjs bin/lib/*.mjs; do
            node -c "$f"
          done
      - name: Unit tests (node:test)
        run: node --test test/*.test.mjs
      - name: Doctor
        run: node bin/os.mjs doctor
      - name: Orchestrate smoke test
        run: node bin/os.mjs next "teste de ci" --json > /dev/null && echo ok
      - name: Scaffold smoke test (instalacao discreta em .harness/)
        run: node bin/scaffold.mjs /tmp/scaff-ci && cd /tmp/scaff-ci && node .harness/bin/os.mjs doctor
